name: cryptography wheel test
permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID from the cryptography_wheel workflow'
        required: true
      version:
        description: 'Version label (for display only)'
        required: false

  workflow_run:
    workflows: ["cryptography windows"]
    types: [completed]

jobs:
  test:
    # Skip workflow_run trigger if the build failed
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.WINDOWS.RUNNER }}
    strategy:
      fail-fast: false
      matrix:
        WINDOWS:
          - {ARCH: "arm64", RUNNER: "windows-11-arm"}
          - {ARCH: "x64", RUNNER: "windows-latest"}
        PYTHON:
          - {VERSION: "3.11"}   # oldest abi3 target
          - {VERSION: "3.13"}   # current stable
          - {VERSION: "3.14"}   # built with
          - {VERSION: "3.14t"}  # free-threaded

    name: "test ${{ matrix.PYTHON.VERSION }}-${{ matrix.WINDOWS.ARCH }}"
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download wheel artifacts
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: cryptography_wheel.yml
          run_id: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
          name: cryptography-*
          name_is_regexp: true
          path: wheelhouse
          skip_unpack: false

      - name: Flatten wheel directory
        shell: pwsh
        run: |
          # Move all .whl files into a flat wheelhouse/ directory
          Get-ChildItem -Path wheelhouse -Recurse -Filter *.whl | ForEach-Object {
            Move-Item $_.FullName -Destination wheelhouse/ -Force
          }
          # Clean up empty subdirectories
          Get-ChildItem -Path wheelhouse -Directory | Remove-Item -Recurse -Force
          Write-Host "Available wheels:"
          Get-ChildItem wheelhouse/*.whl | ForEach-Object { Write-Host "  $_" }

      - name: Setup Python ${{ matrix.PYTHON.VERSION }}-${{ matrix.WINDOWS.ARCH }} via PyManager
        shell: pwsh
        run: |
          winget install Python.PythonInstallManager --source winget --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -ne 0) { throw "Failed to install PyManager" }

          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")

          $pyVersion = "${{ matrix.PYTHON.VERSION }}"
          if ("${{ matrix.WINDOWS.ARCH }}" -ne "x64") {
            $pyVersion += "-${{ matrix.WINDOWS.ARCH }}"
          }
          pymanager install $pyVersion
          if ($LASTEXITCODE -ne 0) { throw "Failed to install Python $pyVersion" }

          # Resolve installed Python path and expose for all subsequent steps
          $pythonExe = pymanager exec -V:$pyVersion -c "import sys; print(sys.executable)"
          if ($LASTEXITCODE -ne 0) { throw "Failed to resolve Python path" }
          $pythonExe = $pythonExe.Trim()
          $pythonDir = Split-Path $pythonExe
          $scriptsDir = Join-Path $pythonDir "Scripts"

          echo "Python executable: $pythonExe"
          echo "Python directory:  $pythonDir"
          echo "$pythonDir" >> $env:GITHUB_PATH
          echo "$scriptsDir" >> $env:GITHUB_PATH

      - name: Install cryptography wheel
        run: python -m pip install cryptography --no-index --find-links wheelhouse/

      - name: Run smoke tests
        run: python tests/cryptography/smoke_test_cryptography.py
